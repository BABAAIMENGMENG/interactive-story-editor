name: Build and Release

on:
  push:
    tags:
      - 'v*' # 当推送 v 开头的 tag 时触发，如 v1.0.0
  workflow_dispatch: # 支持手动触发

jobs:
  # 构建在线版
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build web version
        run: pnpm build

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: .next/

  # 构建桌面版 - macOS
  build-mac:
    runs-on: macos-latest
    needs: []
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build Next.js
        run: pnpm build

      - name: Export Next.js
        run: pnpm next export || true

      - name: Build Electron app for macOS
        run: pnpm electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip

  # 构建桌面版 - Windows
  build-windows:
    runs-on: windows-latest
    needs: []
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build Next.js
        run: pnpm build

      - name: Export Next.js
        run: pnpm next export || true

      - name: Build Electron app for Windows
        run: pnpm electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist-electron/*.exe
            dist-electron/*. portable.exe

  # 构建桌面版 - Linux
  build-linux:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build Next.js
        run: pnpm build

      - name: Export Next.js
        run: pnpm next export || true

      - name: Build Electron app for Linux
        run: pnpm electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb

  # 发布 Release
  release:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: release/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release/

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: release/

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: 互动故事编辑器 ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## 🎉 新版本发布
            
            ### 下载地址
            
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows | `*.exe` | 安装版 |
            | Windows | `*.portable.exe` | 便携版 |
            | macOS | `*.dmg` | 安装镜像 |
            | macOS | `*.zip` | 解压即用 |
            | Linux | `*.AppImage` | 通用格式 |
            | Linux | `*.deb` | Debian/Ubuntu |
            
            ### 功能特性
            
            - ⚡ 本地文件秒级导入
            - 💾 无需上传，直接读取本地磁盘
            - 🔒 数据更安全
            - 📦 支持离线使用
            
            ### 在线版
            
            访问 [在线版](https://your-domain.com) 无需下载即可使用。
            
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
